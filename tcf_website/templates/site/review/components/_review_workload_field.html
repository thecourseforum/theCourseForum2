<div class="workload-field">
    <label>{{ label }}</label>
    <div class="workload-input-wrapper">
        <input type="number"
               class="workload-input"
               name="{{ name }}"
               value="0"
               min="0"
               max="20"
               step="1">
        <span class="workload-suffix">hrs</span>
    </div>
</div>
