{% if user.is_authenticated %}
<a
  class="{{ button_class|default:'btn btn--accent btn--md' }}"
  href="{% url 'schedule_add_course' course.id %}?next={{ request.get_full_path|urlencode }}"
  {% if button_id %}id="{{ button_id }}"{% endif %}
>
  Add to Schedule
</a>
{% else %}
<a
  href="#"
  class="{{ button_class|default:'btn btn--accent btn--md' }}"
  {% if button_id %}id="{{ button_id }}"{% endif %}
  data-modal-open="loginModal"
  data-login-modal-message="Sign in to add courses."
>
  Add to Schedule
</a>
{% endif %}
