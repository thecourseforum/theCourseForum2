{% for question in questions %}
<button type="button"
        class="post-item {% if selected_question and selected_question.id == question.id %}active{% endif %}"
        data-question-id="{{ question.id }}"
        {% if selected_question and selected_question.id == question.id %}aria-current="true"{% else %}aria-current="false"{% endif %}>
    <div class="post-header">
        <span class="post-tag">
            {% if question.course %}
            {{ question.course.subdepartment.mnemonic }} {{ question.course.number }}
            {% elif question.department %}
            {{ question.department.name }}
            {% else %}
            General
            {% endif %}
        </span>
        <span class="post-date">{{ question.created|date:"n/j/y" }}</span>
    </div>
    <div class="post-title">
        {% if question.is_deleted %}
        <em>[deleted]</em>
        {% else %}
        {{ question.title|default:question.text|truncatechars:60 }}
        {% endif %}
    </div>
    <div class="post-preview">
        {% if question.is_deleted %}
        <em>[deleted]</em>
        {% else %}
        {{ question.text|truncatechars:80 }}
        {% endif %}
    </div>
    <div class="post-footer">
        <span class="post-stats {% if question.user_q_vote == 1 %}voted{% endif %}" id="sidebar-vote-count-{{ question.id }}">
            <i class="fa fa-thumbs-up"></i> <span class="sidebar-vote-num">{{ question.sum_q_votes|default:0 }}</span>
        </span>
    </div>
</button>
{% empty %}
<div class="no-posts">
    <i class="fa fa-comments-o fa-3x mb-3"></i>
    <p>No questions found.</p>
</div>
{% endfor %}
