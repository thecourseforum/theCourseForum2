<section class="about-section">
    <h3 class="about-section__title">{{ title }}</h3>
    <div class="team-grid{% if compact %} team-grid--compact{% endif %}">
        {% for member in members %}
            {% include "site/home/components/_about_member_card.html" with member=member image_dir=image_dir %}
        {% empty %}
            <p class="about-empty">No members available.</p>
        {% endfor %}
    </div>
</section>
