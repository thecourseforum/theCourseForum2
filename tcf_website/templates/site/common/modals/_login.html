{% load static %}
{# Login Modal #}
<div class="modal-backdrop"
     id="loginModalBackdrop"
     data-modal-close
     aria-label="Close"></div>
<div class="modal"
     id="loginModal"
     role="dialog"
     aria-labelledby="loginModalTitle"
     aria-modal="true">
    <div class="modal__dialog">
        <div class="modal__header">
            <h2 class="modal__title" id="loginModalTitle">Sign in</h2>
            <button class="modal__close" data-modal-close aria-label="Close">
                <svg viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="modal__body modal__body--centered">
            <img src="{% static 'base/img/new_logo.svg' %}"
                 alt="theCourseForum"
                 class="login-modal__logo"
                 width="200"
                 height="52"
                 decoding="async">
            <p id="loginModalHint"
               class="text-muted text-sm mb-6 hidden"
               role="status"
               aria-live="polite"
               aria-atomic="true"></p>
            <a href="{% url 'login' %}?next={{ request.get_full_path|urlencode }}"
               class="btn btn--primary btn--lg btn--full">
                <svg width="20"
                     height="20"
                     viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2"
                     aria-hidden="true">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                Sign in with UVA Email
            </a>
            <p class="text-subtle text-xs mt-4">
                By continuing, you agree to our
                <a href="{% url 'terms' %}" class="text-primary">Terms</a>
                and
                <a href="{% url 'privacy' %}" class="text-primary">Privacy Policy</a>.
            </p>
        </div>
    </div>
</div>
