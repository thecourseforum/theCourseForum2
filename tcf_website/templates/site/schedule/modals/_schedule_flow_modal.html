{% load static %}
<link rel="stylesheet" href="{% static 'css/site/pages/schedule.css' %}">
<div class="modal-backdrop"
     id="scheduleFlowModalBackdrop"
     data-modal-close
     aria-label="Close"></div>
<div class="modal"
     id="scheduleFlowModal"
     role="dialog"
     aria-labelledby="scheduleFlowModalTitle"
     aria-modal="true">
    <div class="modal__dialog modal__dialog--lg">
        <div class="modal__header">
            <h2 class="modal__title" id="scheduleFlowModalTitle">Schedule</h2>
            <button type="button"
                    class="modal__close"
                    data-modal-close
                    aria-label="Close">
                <svg viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="modal__body schedule-flow-modal__body"
             id="scheduleFlowModalBody"></div>
    </div>
</div>
